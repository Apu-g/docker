version : '3.1'

services:
  mysql_container:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "mysql_container", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 2s
      retries: 10
    volumes: 
    - ./my_sql/init.sql:/docker-entrypoint-initdb.d/init.sql


  flask_container:
    build: flask/.
    container_name: flask_container
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      mysql_container:
        condition: service_healthy
    